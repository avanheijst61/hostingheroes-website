<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 234 56" fill="none" role="img" aria-label="Hosting Heroes">
  <defs>
    <!-- Oranje gradient voor hexagon -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF8B57"/>
      <stop offset="100%" stop-color="#E5521A"/>
    </linearGradient>
    <!-- Subtiele glow achter hexagon -->
    <filter id="hexGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- === ICOON: Platte hexagon (flat-top) === -->
  <!-- Glow-laag (iets groter, dezelfde vorm, geblurd) -->
  <polygon
    points="53,28 41,7 17,7 5,28 17,49 41,49"
    fill="#FF6B35"
    opacity="0.25"
    filter="url(#hexGlow)"
  />

  <!-- Hoofd hexagon -->
  <polygon
    points="53,28 41,7 17,7 5,28 17,49 41,49"
    fill="url(#hexGrad)"
  />

  <!-- Subtiele inner highlight (bovenrand) -->
  <polygon
    points="53,28 41,7 17,7 5,28 17,49 41,49"
    fill="none"
    stroke="rgba(255,255,255,0.18)"
    stroke-width="1"
  />

  <!-- === HH MONOGRAM (wit) ===
       3 verticale balken + 2 dwarsbalkjes
       Balken: breedte 4.5px, hoogte 30px (y=13–43)
       Links:   x=12–16.5
       Midden:  x=25.5–30
       Rechts:  x=39–43.5
       Dwarsbalk: y=25.5–30.5
  -->
  <g fill="white">
    <!-- Linker verticale balk -->
    <rect x="12"   y="13" width="4.5" height="30" rx="1.5"/>
    <!-- Middelste verticale balk -->
    <rect x="25.5" y="13" width="4.5" height="30" rx="1.5"/>
    <!-- Rechter verticale balk -->
    <rect x="39"   y="13" width="4.5" height="30" rx="1.5"/>
    <!-- Linker dwarsbalk -->
    <rect x="16.5" y="25.5" width="9" height="5" rx="0.75"/>
    <!-- Rechter dwarsbalk -->
    <rect x="30"   y="25.5" width="9" height="5" rx="0.75"/>
  </g>

  <!-- === WOORDMERK === -->
  <!-- "HOSTING HEROES" — wit, vet -->
  <text
    x="68" y="26"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="17.5"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-0.4"
  >HOSTING HEROES</text>

  <!-- "AUTOMATE EVERYTHING" — tagline, klein, grijs -->
  <text
    x="69" y="41"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="7.5"
    font-weight="600"
    fill="#6b7280"
    letter-spacing="2.5"
  >AUTOMATE EVERYTHING</text>
</svg>
