<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 58" fill="none">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF8B57"/>
      <stop offset="100%" stop-color="#E5521A"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <polygon points="55,29 43,8 19,8 7,29 19,50 43,50"
    fill="#FF6B35" opacity="0.25"/>

  <!-- Hexagon -->
  <polygon points="55,29 43,8 19,8 7,29 19,50 43,50"
    fill="url(#hexGrad)"/>

  <!-- Border -->
  <polygon points="55,29 43,8 19,8 7,29 19,50 43,50"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- HH monogram -->
  <g fill="white">
    <rect x="14"   y="15" width="5" height="28" rx="2"/>
    <rect x="27.5" y="15" width="5" height="28" rx="2"/>
    <rect x="41"   y="15" width="5" height="28" rx="2"/>
    <rect x="19"   y="26.5" width="8.5" height="5" rx="1"/>
    <rect x="32.5" y="26.5" width="8.5" height="5" rx="1"/>
  </g>
</svg>
